name: Security — OWASP Dependency Check

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - '**/pom.xml'           # re-scan whenever dependencies change
  schedule:
    - cron: '0 3 * * 1'       # every Monday at 03:00 UTC (off-peak for energy firms)
  workflow_dispatch:           # allow on-demand manual trigger from GitHub UI

jobs:
  owasp-scan:
    name: OWASP CVE Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings (Confluent repo)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <profiles>
              <profile>
                <id>confluent</id>
                <repositories>
                  <repository>
                    <id>confluent</id>
                    <url>https://packages.confluent.io/maven/</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>confluent</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      # The NVD API key increases rate limits significantly — set it as a
      # GitHub Actions secret (OWASP_NVD_API_KEY) for faster scans.
      # Get a free key at: https://nvd.nist.gov/developers/request-an-api-key
      - name: Run OWASP Dependency-Check
        run: |
          mvn --batch-mode org.owasp:dependency-check-maven:9.0.9:aggregate \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON \
            -DnvdApiKey=${{ secrets.OWASP_NVD_API_KEY }} \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            --no-transfer-progress
        continue-on-error: true   # report results without blocking the pipeline on known acceptable CVEs

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

      - name: Upload JSON report (for SIEM integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-json
          path: target/dependency-check-report.json
          retention-days: 30

      - name: Summarise critical findings
        if: always()
        run: |
          echo "## OWASP Dependency-Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/dependency-check-report.json ]; then
            CRITICAL=$(python3 -c "
          import json, sys
          data = json.load(open('target/dependency-check-report.json'))
          deps = data.get('dependencies', [])
          count = sum(1 for d in deps for v in d.get('vulnerabilities', []) if v.get('cvssv3', {}).get('baseScore', 0) >= 9.0)
          print(count)
          " 2>/dev/null || echo "N/A")
            echo "**Critical CVEs (CVSS ≥ 9.0):** $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Full report available in Actions artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "Report not generated — check the scan step for errors." >> $GITHUB_STEP_SUMMARY
          fi
