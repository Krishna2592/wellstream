name: CI — Build, Test & Static Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Confluent packages are in a private Maven repo — wire it in via settings
      - name: Configure Maven settings (Confluent repo)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <profiles>
              <profile>
                <id>confluent</id>
                <repositories>
                  <repository>
                    <id>confluent</id>
                    <url>https://packages.confluent.io/maven/</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>confluent</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Build all modules (skip tests for compile check)
        run: mvn --batch-mode clean package -DskipTests

      - name: Run unit tests
        run: mvn --batch-mode test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            producer/target/surefire-reports/
            spark-processor/target/surefire-reports/
          retention-days: 14

  static-analysis:
    name: SpotBugs Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings (Confluent repo)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <profiles>
              <profile>
                <id>confluent</id>
                <repositories>
                  <repository>
                    <id>confluent</id>
                    <url>https://packages.confluent.io/maven/</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>confluent</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Compile (needed before SpotBugs can analyse bytecode)
        run: mvn --batch-mode compile -DskipTests

      - name: Run SpotBugs
        run: mvn --batch-mode com.github.spotbugs:spotbugs-maven-plugin:4.8.3.1:check
        continue-on-error: true

      - name: Upload SpotBugs XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            producer/target/spotbugsXml.xml
            spark-processor/target/spotbugsXml.xml
          retention-days: 14
