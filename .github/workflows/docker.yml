name: Docker — Build & Push Images

on:
  push:
    branches: [ "main", "master" ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  # Images are published under your GitHub username
  IMAGE_PRODUCER: ghcr.io/${{ github.repository_owner }}/wellstream-producer
  IMAGE_SPARK: ghcr.io/${{ github.repository_owner }}/wellstream-spark-processor

jobs:
  build-jars:
    name: Compile & Package JARs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings (Confluent repo)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <profiles>
              <profile>
                <id>confluent</id>
                <repositories>
                  <repository>
                    <id>confluent</id>
                    <url>https://packages.confluent.io/maven/</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>confluent</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Build fat JARs
        run: mvn --batch-mode clean package -DskipTests

      # Persist JARs so the Docker job can pick them up without rebuilding
      - name: Upload producer JAR
        uses: actions/upload-artifact@v4
        with:
          name: producer-jar
          path: producer/target/producer-1.0.0-jar-with-dependencies.jar

      - name: Upload spark-processor JAR
        uses: actions/upload-artifact@v4
        with:
          name: spark-processor-jar
          path: spark-processor/target/spark-processor-jar-with-dependencies.jar

  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-jars
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Download producer JAR
        uses: actions/download-artifact@v4
        with:
          name: producer-jar
          path: producer/target/

      - name: Download spark-processor JAR
        uses: actions/download-artifact@v4
        with:
          name: spark-processor-jar
          path: spark-processor/target/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive image tags: git SHA for full traceability + 'latest' for convenience
      - name: Extract metadata — Producer
        id: meta-producer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PRODUCER }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Extract metadata — Spark Processor
        id: meta-spark
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPARK }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Build & push — wellstream-producer
        uses: docker/build-push-action@v5
        with:
          context: producer
          push: true
          tags: ${{ steps.meta-producer.outputs.tags }}
          labels: ${{ steps.meta-producer.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — wellstream-spark-processor
        uses: docker/build-push-action@v5
        with:
          context: spark-processor
          push: true
          tags: ${{ steps.meta-spark.outputs.tags }}
          labels: ${{ steps.meta-spark.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
